services:
  - type: web
    name: chocoberry
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: PORT
        value: 8080
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: chocoberry
      - key: CLOUDINARY_CLOUD_NAME
        value: dnpam2shj
      - key: CLOUDINARY_UPLOAD_PRESET
        value: chocoberry_unsigned
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: drag717/chocoberry
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_DATA_PREFIX
        value: server-data
